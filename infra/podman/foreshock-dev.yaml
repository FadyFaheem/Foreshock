apiVersion: v1
kind: Pod
metadata:
  name: foreshock-dev-pod
spec:
  # DNS configuration - ensures DNS resolution works properly
  dnsPolicy: "None"
  dnsConfig:
    nameservers:
      - "8.8.8.8"      # Google DNS
      - "8.8.4.4"      # Google DNS backup
      - "1.1.1.1"      # Cloudflare DNS
    searches:
      - "."
    options:
      - name: ndots
        value: "2"
      - name: edns0
  # Restart container if it crashes (non-zero exit).
  restartPolicy: OnFailure
  # Train the models on the very first pod boot (idempotent). Runs to completion
  # before the app containers; downloads the CWRU subset and trains the classifier
  # + health model into the repo's models/ dir, then exits. Skips instantly once
  # models exist, so it only does real work on the first boot.
  initContainers:
    - name: trainer
      image: docker.io/python:3.11-slim
      command: ["/bin/sh", "/app/scripts/first_boot_train.sh"]
      env:
        - name: PYTHONPATH
          value: /app
        # First boot trains the health model on NASA IMS run-to-failure data
        # (~1 GB download, one-time). Set to "0" to skip (CWRU-derived fallback).
        - name: USE_IMS
          value: "1"
      volumeMounts:
        # Writable (no readOnly): training writes models/ and downloads into data/.
        - name: project-root
          mountPath: /app
        - name: host-resolv
          mountPath: /etc/resolv.conf
          readOnly: true
  containers:
    # PostgreSQL + pgvector. infra/database is mounted as the init dir, so the
    # schema is created on first start. Intra-pod only (no host port).
    - name: postgres-db
      image: docker.io/pgvector/pgvector:pg16
      env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_DB
          value: foreshock
      volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
        - name: db-init
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true

    # Kafka broker (KRaft, single node) for the v3 live sensor feed.
    - name: kafka
      image: docker.io/apache/kafka:3.9.0
      env:
        - name: KAFKA_NODE_ID
          value: "1"
        - name: KAFKA_PROCESS_ROLES
          value: broker,controller
        - name: KAFKA_LISTENERS
          value: PLAINTEXT://localhost:9092,CONTROLLER://localhost:9093
        - name: KAFKA_ADVERTISED_LISTENERS
          value: PLAINTEXT://localhost:9092
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: CONTROLLER
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@localhost:9093"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: "0"
        - name: KAFKA_HEAP_OPTS
          value: "-Xmx512M -Xms256M"
      ports:
        - containerPort: 9092
          hostPort: 9092

    # Local LLM (Ollama, CPU-only) - runs entirely in-pod, no host install needed.
    # On first start it pulls the small models into a persistent volume (a fast
    # no-op on later starts). Tuned to stay light on a CPU box: one request at a
    # time and models kept warm so there is no per-request reload.
    # ~3 GB RAM with llama3.2:1b + nomic-embed-text loaded.
    - name: ollama
      image: docker.io/ollama/ollama:latest
      command: ["/bin/sh"]
      args:
        - "-c"
        - "ollama serve & srv=$!; until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull \"$LLM_MODEL\"; ollama pull \"$EMBED_MODEL\"; wait $srv"
      env:
        - name: OLLAMA_HOST            # bind for the server (shared pod localhost)
          value: 0.0.0.0:11434
        - name: OLLAMA_KEEP_ALIVE      # keep models resident (no cold reloads)
          value: "24h"
        - name: OLLAMA_MAX_LOADED_MODELS  # chat (1b) + embeddings; both small
          value: "2"
        - name: OLLAMA_NUM_PARALLEL    # one request at a time -> low memory/CPU
          value: "1"
        # Models to pull on start. For an even lighter/snappier box, set LLM_MODEL
        # to qwen2.5:0.5b. Keep EMBED_MODEL at nomic-embed-text (768-d schema).
        - name: LLM_MODEL
          value: llama3.2:1b
        - name: EMBED_MODEL
          value: nomic-embed-text
      volumeMounts:
        - name: ollama-models
          mountPath: /root/.ollama

    # Flask API (thin layer over the src/ engine). Installs deps on start and
    # serves the dev server. The repo root is mounted read-only at /app so the
    # API can import src/ and load models/.
    - name: foreshock-api
      image: docker.io/python:3.11-slim
      command: ["/bin/sh"]
      args: ["-c", "cd /app/infra/api && pip install --quiet --no-cache-dir -r requirements.txt && exec python app.py"]
      env:
        - name: FLASK_ENV
          value: development
        - name: PORT
          value: "5000"
        - name: PYTHONPATH
          value: /app
        # Postgres + pgvector (the postgres-db container in this pod).
        - name: DB_HOST
          value: localhost
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: foreshock
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: postgres
        # Local LLM: the ollama container in this pod (shared localhost).
        - name: OLLAMA_HOST
          value: http://localhost:11434
        - name: LLM_MODEL
          value: llama3.2:1b
        - name: EMBED_MODEL
          value: nomic-embed-text
        # Kafka broker (the kafka container in this pod).
        - name: KAFKA_BOOTSTRAP
          value: localhost:9092
      ports:
        # Host port 8000 (not 5000) because macOS reserves 5000 for AirPlay.
        # The container still listens on 5000, so intra-pod proxy + cloudflared
        # (which target localhost:5000) are unchanged.
        - containerPort: 5000
          hostPort: 8000
      volumeMounts:
        - name: project-root
          mountPath: /app
          readOnly: true
        - name: host-resolv
          mountPath: /etc/resolv.conf
          readOnly: true

    # React Frontend (Vite dev server). Proxies /api to the API container,
    # which shares this pod's network (localhost:5000).
    - name: foreshock-frontend
      image: docker.io/node:20-alpine
      command: ["/bin/sh"]
      args: ["-c", "cd /app && npm install && npm run dev -- --host 0.0.0.0 --port 3000"]
      env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "3000"
        - name: VITE_API_PROXY
          value: http://localhost:5000
        # Allow the dev tunnel hostname through Vite's host check.
        - name: VITE_ALLOWED_HOSTS
          value: dev-foreshock.faheemlabs.com
        # Bind-mounted source in the VM needs polling for hot reload.
        - name: VITE_USE_POLLING
          value: "1"
      ports:
        - containerPort: 3000
          hostPort: 3000
      volumeMounts:
        - name: frontend-code
          mountPath: /app
        - name: host-resolv
          mountPath: /etc/resolv.conf
          readOnly: true

    # Cloudflare Tunnel - exposes the dev environment via cloudflared.
    # No inbound ports needed; cloudflared dials out to Cloudflare's edge.
    # Setup: see infra/cloudflared/config.yml for one-time instructions.
    - name: cloudflared
      image: cloudflare/cloudflared:latest
      command: ["cloudflared"]
      args: ["tunnel", "--config", "/etc/cloudflared/config.yml", "run"]
      securityContext:
        runAsUser: 0
      volumeMounts:
        - name: cloudflared-config
          mountPath: /etc/cloudflared

  volumes:
    # Repo root (read-only): gives the API container src/, infra/api/, models/.
    - name: project-root
      hostPath:
        path: /Users/fadyfaheem/Documents/GitHub/Foreshock
        type: Directory
    # Frontend (read-write): the container runs `npm install` here.
    - name: frontend-code
      hostPath:
        path: /Users/fadyfaheem/Documents/GitHub/Foreshock/frontend
        type: Directory
    - name: host-resolv
      hostPath:
        path: /etc/resolv.conf
        type: File
    - name: cloudflared-config
      hostPath:
        path: /Users/fadyfaheem/Documents/GitHub/Foreshock/infra/cloudflared
        type: Directory
    - name: pgdata
      persistentVolumeClaim:
        claimName: foreshock-dev-db
    - name: db-init
      hostPath:
        path: /Users/fadyfaheem/Documents/GitHub/Foreshock/infra/database
        type: Directory
    # Pulled Ollama models persist here across pod restarts.
    - name: ollama-models
      persistentVolumeClaim:
        claimName: foreshock-dev-ollama

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: foreshock-dev-db
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: foreshock-dev-ollama
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
