apiVersion: v1
kind: Pod
metadata:
  name: foreshock-prod-pod
spec:
  # Host network mode ensures containers bind to 0.0.0.0 and are reachable by
  # the tunnel; fixes Podman binding only to 127.0.0.1.
  hostNetwork: true
  dnsPolicy: "None"
  dnsConfig:
    nameservers:
      - "8.8.8.8"
      - "8.8.4.4"
      - "1.1.1.1"
    searches:
      - "."
    options:
      - name: ndots
        value: "2"
      - name: edns0
  restartPolicy: OnFailure
  containers:
    # PostgreSQL + pgvector. infra/database is the init dir (schema on first start).
    - name: postgres-db
      image: docker.io/pgvector/pgvector:pg16
      # hostNetwork binds this port directly on the host, so 5432 would collide
      # with any host PostgreSQL. Listen on 15432 instead; clients use DB_PORT.
      args: ["postgres", "-c", "port=15432"]
      env:
        - name: PGPORT                 # keep psql/pg_isready + first-init in sync
          value: "15432"
        - name: POSTGRES_USER
          value: postgres
        # TODO: change this and the matching DB_PASSWORD before any non-local deploy.
        - name: POSTGRES_PASSWORD
          value: CHANGE-ME-postgres-password
        - name: POSTGRES_DB
          value: foreshock
      volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
        - name: db-init
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true

    # Kafka broker (KRaft, single node) for the v3 live sensor feed.
    - name: kafka
      image: docker.io/apache/kafka:3.9.0
      env:
        - name: KAFKA_NODE_ID
          value: "1"
        - name: KAFKA_PROCESS_ROLES
          value: broker,controller
        - name: KAFKA_LISTENERS
          value: PLAINTEXT://localhost:19092,CONTROLLER://localhost:19093
        - name: KAFKA_ADVERTISED_LISTENERS
          value: PLAINTEXT://localhost:19092
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: CONTROLLER
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@localhost:19093"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        - name: KAFKA_HEAP_OPTS
          value: "-Xmx512M -Xms256M"

    # Local LLM (Ollama, CPU-only) - runs entirely in-pod, no host install needed.
    # On first start it pulls the small models into a persistent volume (a fast
    # no-op on later starts). Tuned to stay light on a CPU box: one request at a
    # time and models kept warm so there is no per-request reload.
    # ~3 GB RAM with llama3.2:1b + nomic-embed-text - comfortable on a 4c/32 GB host.
    # NOTE: hostNetwork binds this on the host; we use 21434 (non-default) so it
    # won't clash with a host `ollama serve` on 11434.
    - name: ollama
      image: docker.io/ollama/ollama:latest
      command: ["/bin/sh"]
      args:
        - "-c"
        - "ollama serve & srv=$!; until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull \"$LLM_MODEL\"; ollama pull \"$EMBED_MODEL\"; wait $srv"
      env:
        - name: OLLAMA_HOST            # bind for the server
          value: 0.0.0.0:21434
        - name: OLLAMA_KEEP_ALIVE      # keep models resident (no cold reloads)
          value: "24h"
        - name: OLLAMA_MAX_LOADED_MODELS  # chat (1b) + embeddings; both small
          value: "2"
        - name: OLLAMA_NUM_PARALLEL    # one request at a time -> low memory/CPU
          value: "1"
        # For an even lighter/snappier box, set LLM_MODEL to qwen2.5:0.5b.
        # Keep EMBED_MODEL at nomic-embed-text (the DB schema is vector(768)).
        - name: LLM_MODEL
          value: llama3.2:1b
        - name: EMBED_MODEL
          value: nomic-embed-text
      volumeMounts:
        - name: ollama-models
          mountPath: /root/.ollama

    # Flask API via gunicorn. Repo root mounted read-only at /app.
    - name: foreshock-api
      image: docker.io/python:3.11-slim
      command: ["/bin/sh"]
      # gthread (not the default sync worker): the /api/stream SSE endpoint holds a
      # connection open for its whole life, which would pin a sync worker. Threads
      # let long-lived streams + normal requests run concurrently (2 x 16 = 32).
      args: ["-c", "cd /app/infra/api && pip install --quiet --no-cache-dir -r requirements.txt && exec gunicorn --bind 0.0.0.0:15000 --worker-class gthread --workers 2 --threads 16 --timeout 120 --access-logfile - --error-logfile - app:app"]
      env:
        - name: FLASK_ENV
          value: production
        - name: PORT
          value: "15000"
        - name: PYTHONPATH
          value: /app
        - name: DB_HOST
          value: localhost
        - name: DB_PORT
          value: "15432"
        - name: DB_NAME
          value: foreshock
        - name: DB_USER
          value: postgres
        # TODO: change this and POSTGRES_PASSWORD below before any non-local deploy.
        - name: DB_PASSWORD
          value: CHANGE-ME-postgres-password
        # hostNetwork: the API reaches the in-pod ollama container on localhost.
        - name: OLLAMA_HOST
          value: http://localhost:21434
        - name: LLM_MODEL
          value: llama3.2:1b
        - name: EMBED_MODEL
          value: nomic-embed-text
        - name: KAFKA_BOOTSTRAP
          value: localhost:19092
      volumeMounts:
        - name: project-root
          mountPath: /app
          readOnly: true
        - name: host-resolv
          mountPath: /etc/resolv.conf
          readOnly: true

    # React Frontend - build then serve static files on port 18080. The built app
    # calls /api on the same origin; cloudflared routes /api/* to the API.
    - name: foreshock-frontend
      image: docker.io/node:20-alpine
      command: ["/bin/sh"]
      args: ["-c", "cd /app && npm install && npm run build && npx -y serve -s dist -l 18080"]
      env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "18080"
      volumeMounts:
        - name: frontend-code
          mountPath: /app
        - name: host-resolv
          mountPath: /etc/resolv.conf
          readOnly: true

    # Cloudflare Tunnel - exposes the prod environment.
    # Setup: see infra/cloudflared/config.prod.yml.
    - name: cloudflared
      image: cloudflare/cloudflared:latest
      command: ["cloudflared"]
      args: ["tunnel", "--config", "/etc/cloudflared/config.prod.yml", "run"]
      securityContext:
        runAsUser: 0
      volumeMounts:
        - name: cloudflared-config
          mountPath: /etc/cloudflared

  volumes:
    # TODO: update these absolute paths to the project location on the prod host.
    - name: project-root
      hostPath:
        path: /home/ubuntu/Foreshock
        type: Directory
    - name: frontend-code
      hostPath:
        path: /home/ubuntu/Foreshock/frontend
        type: Directory
    - name: host-resolv
      hostPath:
        path: /etc/resolv.conf
        type: File
    - name: cloudflared-config
      hostPath:
        path: /home/ubuntu/Foreshock/infra/cloudflared
        type: Directory
    - name: pgdata
      persistentVolumeClaim:
        claimName: foreshock-prod-db
    - name: db-init
      hostPath:
        path: /home/ubuntu/Foreshock/infra/database
        type: Directory
    # Pulled Ollama models persist here across pod restarts.
    - name: ollama-models
      persistentVolumeClaim:
        claimName: foreshock-prod-ollama

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: foreshock-prod-db
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: foreshock-prod-ollama
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
